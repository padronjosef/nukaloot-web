name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bash scripts/bump-version.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ghcr.io/padronjosef/nukaloot-web:latest .
          docker push ghcr.io/padronjosef/nukaloot-web:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: /opt/nukaloot/nukaloot-infra/terraform/scripts/deploy.sh web

      - name: Push version bump
        if: env.BUMPED == 'true'
        run: git push --force-with-lease

      - name: Create GitHub Release
        if: env.BUMPED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges -20)
          fi
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          gh release create "v$NEW_VERSION" \
            --title "v$NEW_VERSION" \
            --notes "$CHANGELOG"
